<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Proyecto - InfraCR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <link rel="stylesheet" href="../css/pagina_reportes.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <h1>InfraCR</h1>
            <img src="/assets/logos/logo.png" alt="Logo InfraCR">
        </div>
        <a href="/pages/map.html">Mapa</a>
        <a href="/pages/login.html">Iniciar Sesión</a>
        <div class="footer">
            <p>Términos de uso · Privacidad<br>© InfraNación 2026 | soporte@infranacion.com</p>
        </div>
    </nav>

    <main class="main-content">
        <h2>Crear Proyecto</h2>
        
        <form id="reporteForm" class="formularios">
            <!-- Ubicación -->
            <div class="campo">
                <label for="ubicacion">Ubicación</label>
                <input type="text" id="ubicacion" name="ubicacion" placeholder="Ingrese la ubicación" required>
            </div>

            <!-- Mapa -->
            <div class="mapa-container">
                <label>Seleccione en el mapa</label>
                <div id="map"></div>
                <input type="hidden" id="latitud" name="latitud">
                <input type="hidden" id="longitud" name="longitud">
            </div>

            <!-- Categoría -->
            <div class="categoria-container">
                <label for="categoria">Seleccione una categoría</label>
                <select name="categoria" id="categoria" required>
                    <option value="" disabled selected>-- Seleccione --</option>
                    <option value="semaforos">Semáforos</option>
                    <option value="basura">Basura</option>
                    <option value="aceras">Aceras</option>
                    <option value="calles">Calles</option>
                </select>
            </div>

            <!-- Evidencia -->
            <div class="evidencia" id="evidencia">
                <label for="imagen">Subir imagen del reporte</label>
                <input type="file" id="imagen" name="imagen" accept="image/jpeg,image/png,image/webp" required>
                <div id="preview"></div>
            </div>

            <!-- Descripción (recomendado para Supabase) -->
            <div class="campo">
                <label for="descripcion">Descripción del problema</label>
                <textarea id="descripcion" name="descripcion" rows="4" placeholder="Describa el problema..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Reporte</button>
        </form>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    <script src="../js/pagina_reportes.js"></script>
</body>
</html>
